<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZyroAI</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="dark-theme transition-colors duration-300 bg-[#212121] text-white overflow-hidden">

    <div class="flex h-screen">
        <aside class="w-64 bg-[#171717] flex flex-col border-r border-white/10 p-4">
            <button id="new-chat" class="flex items-center gap-2 border border-white/20 p-2 rounded-lg hover:bg-white/10 mb-6">
                <i data-lucide="plus" class="w-4 h-4"></i> New Chat
            </button>
            <div class="flex-1 overflow-y-auto" id="project-list">
                <p class="text-xs text-gray-500 font-bold uppercase mb-2">Projects</p>
                </div>
            <div class="border-t border-white/10 pt-4 space-y-2">
                <button id="theme-toggle" class="flex items-center gap-3 w-full p-2 hover:bg-white/10 rounded">
                    <i data-lucide="sun" class="w-5 h-5"></i> <span>Light Mode</span>
                </button>
                <button id="auth-btn" class="flex items-center gap-3 w-full p-2 hover:bg-white/10 rounded">
                    <i data-lucide="user" class="w-5 h-5"></i> <span id="auth-text">Login</span>
                </button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col relative">
            <header class="p-4 flex justify-between border-b border-white/10">
                <select id="model-select" class="bg-transparent font-bold outline-none cursor-pointer">
                    <option value="open-mistral-7b">Mistral 7B (Free)</option>
                    <option value="mistral-tiny">Mistral Tiny</option>
                    <option value="mistral-small-latest">Mistral Small</option>
                </select>
                <div id="user-status" class="text-xs text-gray-500 self-center">Guest Mode</div>
            </header>

            <div id="chat-window" class="flex-1 overflow-y-auto p-4 space-y-6 max-w-3xl mx-auto w-full">
                </div>

            <div class="p-4 max-w-3xl mx-auto w-full">
                <div class="bg-[#2f2f2f] rounded-2xl border border-white/10 p-2 flex items-center shadow-xl">
                    <label class="p-2 text-gray-400 hover:text-white cursor-pointer">
                        <i data-lucide="paperclip" class="w-5 h-5"></i>
                        <input type="file" id="file-input" class="hidden">
                    </label>
                    <textarea id="user-input" rows="1" placeholder="Message ZyroAI..." class="flex-1 bg-transparent border-none outline-none p-2 resize-none"></textarea>
                    <button id="send-btn" class="bg-white text-black p-2 rounded-xl hover:bg-gray-200">
                        <i data-lucide="arrow-up" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <div id="auth-modal" class="fixed inset-0 bg-black/80 hidden z-50 flex items-center justify-center p-4">
        <div class="bg-[#212121] border border-white/10 p-8 rounded-2xl w-full max-w-md">
            <h2 class="text-2xl font-bold mb-6 text-center">Join ZyroAI</h2>
            <div class="space-y-4">
                <input type="email" id="email" placeholder="Email" class="w-full bg-[#2f2f2f] p-3 rounded-lg outline-none">
                <input type="password" id="password" placeholder="Password" class="w-full bg-[#2f2f2f] p-3 rounded-lg outline-none">
                <button onclick="signIn()" class="w-full bg-white text-black font-bold p-3 rounded-lg">Login</button>
                <button onclick="signUp()" class="w-full border border-white/20 p-3 rounded-lg hover:bg-white/5">Sign Up</button>
                <div class="text-center text-gray-500 py-2">OR</div>
                <button onclick="googleSignIn()" class="w-full bg-blue-600 p-3 rounded-lg font-bold flex items-center justify-center gap-2">
                    <i data-lucide="chrome" class="w-5 h-5"></i> Google Login
                </button>
                <button onclick="closeModal()" class="w-full text-gray-400 mt-4 underline text-sm">Continue as Guest</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
