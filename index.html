<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZyroAI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#212121] text-white transition-colors duration-300">

    <div class="flex h-screen overflow-hidden">
        <aside class="w-64 bg-[#171717] flex flex-col border-r border-white/10 p-4">
            <div class="flex items-center gap-2 mb-6 px-2">
                <div class="w-8 h-8 bg-emerald-500 rounded-lg flex items-center justify-center font-bold">Z</div>
                <span class="font-bold text-xl tracking-tight">ZyroAI</span>
            </div>

            <button onclick="newChat()" class="flex items-center gap-2 border border-white/20 p-2 rounded-lg hover:bg-white/10 mb-6 transition w-full">
                <i data-lucide="plus" class="w-4 h-4"></i> New Chat
            </button>

            <div class="flex-1 overflow-y-auto space-y-4" id="sidebar-folders">
                <div class="text-xs text-gray-500 font-bold uppercase px-2">Projects</div>
                <div id="project-list" class="space-y-1">
                    </div>
            </div>

            <div class="border-t border-white/10 pt-4 space-y-2">
                <button onclick="toggleTheme()" class="flex items-center gap-3 w-full p-2 hover:bg-white/10 rounded transition">
                    <i data-lucide="sun" id="theme-icon" class="w-5 h-5"></i> <span id="theme-text">Light Mode</span>
                </button>
                <button onclick="openProfile()" class="flex items-center gap-3 w-full p-2 hover:bg-white/10 rounded transition">
                    <i data-lucide="user" class="w-5 h-5"></i> Profile
                </button>
                <button id="auth-btn" onclick="openAuthModal()" class="flex items-center gap-3 w-full p-2 hover:bg-white/10 rounded transition text-emerald-400">
                    <i data-lucide="log-in" class="w-5 h-5"></i> Login / Signup
                </button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col bg-[#212121] transition-colors" id="main-bg">
            <header class="p-4 border-b border-white/10 flex justify-between items-center">
                <select id="model-select" class="bg-transparent border-none outline-none font-bold text-lg cursor-pointer appearance-none hover:text-emerald-400 transition">
                    <option value="open-mistral-7b" class="bg-[#171717]">Mistral 7B (Free)</option>
                    <option value="mistral-tiny" class="bg-[#171717]">Mistral Tiny</option>
                    <option value="mistral-small-latest" class="bg-[#171717]">Mistral Small</option>
                    <option value="mistral-medium-latest" class="bg-[#171717]">Mistral Medium</option>
                    <option value="mistral-large-latest" class="bg-[#171717]">Mistral Large</option>
                </select>
                <div id="user-badge" class="text-[10px] uppercase border border-white/20 px-2 py-1 rounded tracking-widest opacity-50">Guest Mode</div>
            </header>

            <div id="chat-window" class="flex-1 overflow-y-auto p-4 space-y-6 max-w-3xl mx-auto w-full">
                <div class="h-full flex flex-col items-center justify-center text-center opacity-20 mt-20">
                    <i data-lucide="message-square" class="w-20 h-20 mb-4"></i>
                    <h1 class="text-3xl font-bold">How can ZyroAI help you?</h1>
                </div>
            </div>

            <div class="p-4 max-w-3xl mx-auto w-full mb-4">
                <div class="bg-[#2f2f2f] rounded-2xl border border-white/10 p-3 shadow-2xl relative transition-all" id="input-container">
                    <div class="flex items-end gap-2">
                        <label class="p-2 text-gray-400 hover:text-white cursor-pointer transition">
                            <i data-lucide="paperclip" class="w-5 h-5"></i>
                            <input type="file" id="file-input" class="hidden">
                        </label>
                        <textarea id="user-input" rows="1" placeholder="Message ZyroAI..." class="flex-1 bg-transparent border-none outline-none p-2 resize-none text-white max-h-40 overflow-y-auto" oninput="autoGrow(this)"></textarea>
                        <button id="send-btn" onclick="handleSend()" class="bg-white text-black p-2 rounded-xl hover:bg-emerald-400 hover:text-white transition disabled:opacity-50">
                            <i data-lucide="arrow-up" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="auth-modal" class="fixed inset-0 bg-black/80 hidden z-50 flex items-center justify-center p-4">
        <div class="bg-[#171717] border border-white/10 p-8 rounded-3xl w-full max-w-sm shadow-2xl">
            <h2 class="text-2xl font-bold mb-6 text-center">ZyroAI Account</h2>
            <div class="space-y-4">
                <input type="email" id="email" placeholder="Email (ronk83952@gmail.com)" class="w-full bg-white/5 border border-white/10 p-3 rounded-xl outline-none focus:border-emerald-500 transition">
                <input type="password" id="password" placeholder="Password" class="w-full bg-white/5 border border-white/10 p-3 rounded-xl outline-none focus:border-emerald-500 transition">
                <button onclick="authAction('login')" class="w-full bg-white text-black font-bold p-3 rounded-xl hover:bg-emerald-500 hover:text-white transition">Login</button>
                <button onclick="authAction('signup')" class="w-full border border-white/20 p-3 rounded-xl hover:bg-white/10 transition">Sign Up</button>
                <button onclick="closeModals()" class="w-full text-gray-500 text-sm mt-2">Continue as Guest</button>
            </div>
        </div>
    </div>

    <div id="profile-modal" class="fixed inset-0 bg-black/80 hidden z-50 flex items-center justify-center p-4">
        <div class="bg-[#171717] border border-white/10 p-8 rounded-3xl w-full max-w-md">
            <h2 class="text-xl font-bold mb-6">User Profile</h2>
            <div class="space-y-4">
                <div><label class="text-xs text-gray-500 ml-1">Name</label><input type="text" id="p-name" class="w-full bg-white/5 border border-white/10 p-2 rounded-lg"></div>
                <div class="flex gap-4">
                    <div class="flex-1"><label class="text-xs text-gray-500 ml-1">Age</label><input type="number" id="p-age" class="w-full bg-white/5 border border-white/10 p-2 rounded-lg"></div>
                    <div class="flex-1"><label class="text-xs text-gray-500 ml-1">Occupation</label><input type="text" id="p-job" class="w-full bg-white/5 border border-white/10 p-2 rounded-lg"></div>
                </div>
                <div><label class="text-xs text-gray-500 ml-1">Custom Instructions</label><textarea id="p-instr" class="w-full bg-white/5 border border-white/10 p-2 rounded-lg h-24" placeholder="How should AI talk to you?"></textarea></div>
                <button onclick="saveProfile()" class="w-full bg-emerald-500 text-white font-bold p-3 rounded-xl shadow-lg">Save Profile</button>
                <button onclick="closeModals()" class="w-full text-gray-500">Cancel</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
